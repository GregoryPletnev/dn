stages:
  - test
  - package

default:
  tags:
    - deb-dev

variables:
  DN_CONFIG_DIR: "$CI_PROJECT_DIR/.ci-dn-config"

before_script:
  - |
    if ! command -v fpc >/dev/null || ! command -v dpkg-deb >/dev/null || ! python3 -m venv --help >/dev/null 2>&1; then
      if command -v sudo >/dev/null && sudo -n true; then
        sudo apt-get update
        sudo apt-get install -y fpc make libncursesw5-dev dpkg-dev python3 python3-venv libarchive-tools openssh-client
      else
        echo "Missing CI dependencies and passwordless sudo is unavailable." >&2
        echo "Install on the deb-dev runner: fpc make libncursesw5-dev dpkg-dev python3 python3-venv libarchive-tools openssh-client" >&2
        exit 1
      fi
    fi
  - fpc -iV
  - make --version
  - python3 --version
  - dpkg --version
  - dpkg-deb --version
  - rm -rf "$DN_CONFIG_DIR"
  - mkdir -p "$DN_CONFIG_DIR"

test:
  stage: test
  script:
    - make test

deb:
  stage: package
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
  script:
    - VERSION="${CI_COMMIT_TAG#v}" scripts/build-deb.sh
  artifacts:
    name: "dn-datanavigator-${CI_COMMIT_TAG}-${CI_RUNNER_EXECUTABLE_ARCH}"
    paths:
      - dist/*.deb
    expire_in: 30 days
